<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pegawai</title>
</head>

<body>

    <h2>Data Pegawai</h2>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>Nama Pegawai</th>
                <th>Umur</th>
                <th>Jabatan</th>
                <th>Status</th>
                <th>Gaji Pokok</th>
                <th>Tunjangan Jabatan</th>
                <th>BPJS</th>
                <th>Tunjangan Keluarga</th>
            </tr>
        </thead>

        <!-- Isi Data Pegawai -->
        <tbody id="dataPegawai"></tbody>

        <!-- Total Gaji yang dihasilkan -->
        <tfoot id="totalGaji"></tfoot>
    </table>

    <script>

        // Data Pegawai
        let nama = "Dodi Prayodi";
        let umur = 25;
        let jabatan = "Manajer";
        let status = "Menikah";

        let gapok = 0;

        // Menentukan gaji pokok menggunakan if
        if (jabatan == "Manajer") {
            gapok = 15000000;
        } else if (jabatan == "Asisten Manajer") {
            gapok = 10000000;
        } else {
            gapok = 5000000;
        }

        // Menghitung Tunjangan
        let tj_jabatan = 0.15 * gapok;
        let bpjs = 0.10 * gapok;
        let tj_keluarga = (status == "Menikah") ? 0.20 * gapok : 0;

        // Menghitung total gaji
        let total = gapok + tj_jabatan + bpjs + tj_keluarga;

        // tampilkan ke tabel
        document.getElementById("dataPegawai").innerHTML =
            "<tr>" +
            "<td>" + nama + "</td>" +
            "<td>" + umur + "</td>" +
            "<td>" + jabatan + "</td>" +
            "<td>" + status + "</td>" +
            "<td>" + gapok + "</td>" +
            "<td>" + tj_jabatan + "</td>" +
            "<td>" + bpjs + "</td>" +
            "<td>" + tj_keluarga + "</td>" +
            "</tr>";


        // bagian footer total gaji
        document.getElementById("totalGaji").innerHTML =
            "<tr>" +
            "<th colspan='7'>Total Gaji</th>" +
            "<th>" + total + "</th>" +
            "</tr>";


    </script>

</body>

</html>
