<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Kegiatan</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background-color: #f4f6f9;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            color: #3f72af;
        }

        .gallery img {
            width: 300px;
            height: 300px;
            margin: 10px;
            border-radius: 10px;
        }

        .gallery img:hover {
            opacity: 0.8;
        }

        .keterangan {
            font-size: 13px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Gallery Kegiatan</h2>

        <p class="keterangan">
            Beberapa dokumentasi kegiatan dan project yang pernah saya kerjakan.
            Klik gambar untuk melihat detail.
        </p>

        <div class="gallery">

            <a href="https://www.instagram.com/sharing.thing/" target="main">
                <img src="https://media.licdn.com/dms/image/v2/D562DAQFsK6Ci6IJZpg/profile-treasury-image-shrink_1280_1280/profile-treasury-image-shrink_1280_1280/0/1733062308362?e=1772762400&v=beta&t=witfS6fli4a_RO0XCZePt1V-CH8g3abhBrzhZbzcbYA" alt="Profile">
            </a>
            <a href="https://www.instagram.com/merci.prancis/" target="main">

            </a>
            
            <a href="https://www.figma.com/design/crEJyZkJsDjDCMSzv9GVAP/Thalacare-PSI?node-id=2083-1084&t=pHyoMOPt7JsVYrdh-0" target="_blank">
