<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghitung Luas Bangun Datar</title>
</head>

<body>
<h2>Perhitungan Luas Bangun Datar</h2>

<script>

    // PERHITUNGAN LUAS PERSEGI PANJANG

    // Mendeklarasikan variabel panjang & lebar
    let panjang = 20;
    let lebar = 8;

    // Menghitung luas persegi panjang
    let luasPersegiPanjang = panjang * lebar;

    // Menampilkan nilai variabel
    document.write("<b>Luas Persegi Panjang</b><br>");
    document.write("Panjang = " + panjang + " cm<br>");
    document.write("Lebar = " + lebar + " cm<br>");

    // Menampilkan rumus dan hasil
    document.write("Luas = panjang × lebar = " + panjang + " × " + lebar + " = " + luasPersegiPanjang + " cm²");
    document.write("<br><br>");



    // PERHITUNGAN LUAS BUJUR SANGKAR

    // Mendeklarasikan variabel sisi
    let sisi = 13;

    // Menghitung luas bujur sangkar
    let luasBujurSangkar = sisi * sisi;

    // Menampilkan nilai variabel
    document.write("<b>Luas Bujur Sangkar</b><br>");
    document.write("Sisi = " + sisi + " cm<br>");

    // Menampilkan rumus dan hasil
    document.write("Luas = sisi × sisi = " + sisi + " × " + sisi + " = " + luasBujurSangkar + " cm²");
    document.write("<br><br>");



    // PERHITUNGAN LUAS SEGITIGA

    // Mendeklarasikan variabel alas & tinggi
    let alas = 30;
    let tinggi = 10;

    // Menghitung luas segitiga
    let luasSegitiga = 0.5 * alas * tinggi;

    // Menampilkan nilai variabel
    document.write("<b>Luas Segitiga</b><br>");
    document.write("Alas = " + alas + " cm<br>");
    document.write("Tinggi = " + tinggi + " cm<br>");

    // Menampilkan rumus dan hasil
    document.write("Luas = 1/2 × alas × tinggi = 1/2 × " + alas + " × " + tinggi + " = " + luasSegitiga + " cm²");

</script>

</body>
</html>
