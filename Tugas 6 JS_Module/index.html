<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Users</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h2 {
            color: #333;
        }

        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 8px 8px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 95%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
        }

        button:hover {
            background: #45a049;
        }

        ul {
            margin-top: 20px;
            padding: 0;
        }

        li {
            list-style: none;
            background: #fff;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>

</head>

<body>

    <h2>Tambah Data</h2>
    <form id="formUser">
        <input id="nama" placeholder="Nama" required><br>
        <input id="umur" type="number" placeholder="Umur" required><br>
        <input id="alamat" placeholder="Alamat" required><br>
        <input id="email" type="email" placeholder="Email" required><br>
        <button type="submit">Tambah</button>
    </form>

    <br>

    <button onclick="tampilData()">Tampilkan Data</button>

    <ul id="list"></ul>

    <script type="module" src="main.js"></script>
</body>

</html>
